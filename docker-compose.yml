# Meridian — cap: 1 CPU, 1.5 GiB RAM (tune for ~8 GiB hosts with Ollama + IPFS; raise if you only run Meridian).
# Copy .env next to this file, then: docker compose up -d --build
#
# Ollama in Docker: see `networks.llm` at bottom — or `docker network connect` (see .env.example).

services:
  meridian:
    build: .
    container_name: meridian
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MERIDIAN_DATA_DIR: /data
    volumes:
      # Host folder — put user-config.json here (copy from user-config.example.json)
      - ./meridian-data:/data
    # So LLM_BASE_URL=http://host.docker.internal:11434/v1 can reach Ollama on the Docker host (Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 512M
    # Uncomment when using the `networks.llm` block above:
    # networks:
    #   - default
    #   - llm

# networks:
#   llm:
#     external: true
#     name: ollama_default

